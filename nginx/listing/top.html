<!DOCTYPE html>

<html lang="en">
	<head>
		<title>Directory</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
		<link href="https://fonts.googleapis.com/css?family=Oxygen+Mono|Open+Sans" rel="stylesheet" type="text/css">
		<link rel="stylesheet" href="/listing/style.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>

		<script>
			var websiteName = 'FastDL';
			var websiteURL = '';
			var googleGACode = 'UA-XXXXXXXX-1';
			$(document).ready(function(){
			var text = $("h1").text();
			var array = text.split('/');
			var last = array[array.length-2];
			var dirStructure = $("a").text();
			var dirStructure = document.getElementsByTagName('a')[0].href;
			var dir = text.substring(10);
			var currentDir = last.charAt(0).toUpperCase() + last.slice(1);
			var dirTrun;
			if (currentDir.length > 19){
				var currentDir = currentDir.substring(0, 18) + '...';
			}
			document.title = currentDir + ' – ' + websiteName;

			$("#footerURL").text(websiteName);
			$("#footerURL").attr('href', websiteURL);
			$("h1").html(currentDir);

			if (dir.length > 60) {
				dirTrun = dir.replace(/(.{60})/g, "$1\n")
			} else {
				dirTrun = dir.substring(0, dir.length - 1);
			}
			$("h1").append('<h4><a href="' + dirStructure + '">&#8672;</a>  ' + dirTrun + '</h4>');

			$("h1").prepend('<form id="custom-search-form" class="form-inline pull-right"><div class="btn-group"><input id="searchBox" placeholder="Поиск" type="search" class="form-control"> <span id="searchclear" class="glyphicon glyphicon-remove-circle"></span></div></form>');

			$("a").eq(1).html('../');

			// Add titles.
			$("pre").prepend('<div class="header">Имя                                                   Время                 Размер</div>');
			
			var list = new Array();
			var formats = ["bin", "jpg", "gif", "png", "html", "css", "zip", "iso", "tiff", "ico", "psd", "pdf", "exe", "rar", "deb", "swf", "7z", "doc", "docx", "xls", "xlsx", "pptx", "ppt", "txt", "php", "js", "c", "c++", "torrent", "sql", "wmv", "avi", "mp4", "mp3", "wma", "ogg", "msg", "wav", "py", "java", "gzip", "jpeg", "mdl", "bsp", "raw"];

			$('#custom-search-form').on('input',function(e){
				e.preventDefault();
				var target = $('#searchBox').val();
				filter(target);
			});

			function filter(target){
				var parent_directory = 'parent directory';
				$('pre a').each(function(){
					var arraySearch = decodeURI($(this).attr('href'));
					if (arraySearch.toLowerCase().indexOf(target.toLowerCase()) > -1 || (($(this).text() == 'Parent Directory') && (parent_directory.indexOf(target.toLowerCase()) > -1))){
						$(this).show();
						$($(this)[0].nextSibling).css('display', 'inline');
					} else {
						$(this).hide();
						if($($(this)[0].nextSibling).hasClass('hideMe')) {
							$($(this)[0].nextSibling).css('display', 'none');
						} else {
							$($(this)[0].nextSibling).wrap('<span class="hideMe" style="display:none"></style>');
						}
					}
				});
			}

			$("#searchclear").click(function(){
				$("#searchBox").val('');
				filter('');
			});

			$('pre a').each(function(){
				var found = 0;
				var arraySplit = $(this).attr('href').split(".");
				var fileExt = arraySplit[arraySplit.length - 1];

				for (var i = 0; i < formats.length; i++) {
					if (fileExt.toLowerCase() == formats[i].toLowerCase()) {
						var found = 1;
						var oldText = $(this).text();
						$(this).html('<img class="icons" src="/listing/icons/' + formats[i] + '.png"></img></a>' + oldText);
						return;
					}
				}

				if ($(this).text().indexOf("../") >= 0) {
					var found = 1;
					var oldText = $(this).text();
					$(this).html('<img class="icons" src="/listing/icons/home.png">' + oldText);
					return;
				}

				if ($(this).attr('href').substr($(this).attr('href').length - 1) == '/') {
					var found = 1;
					var oldText = $(this).text();
					$(this).html('<img class="icons" src="/listing/icons/folder.png">' + oldText.substring(0, oldText.length - 1));

					var string = ' ' + $($(this)[0].nextSibling).text();
					$($(this)[0].nextSibling).remove();
					$(this).after(string);
					return;
				}

				if (found == 0){
					var oldText = $(this).text();
					$(this).html('<img class="icons" src="/listing/icons/error.png">' + oldText);
					return;
				}
			});
		});
		</script>

		<script>
			(function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
			(i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
			m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
			})(window,document,'script','//www.google-analytics.com/analytics.js','ga');
			ga('create', googleGACode, 'auto');
			ga('send', 'pageview');
		</script>

	</head>

	<body>
		<div class="wasContainer">
			<div class="row">
				<div class="col-xs-11 col-centered" id="mainBox">
