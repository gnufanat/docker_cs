server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /cstrike/ {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_before_body /listing/top.html;
        add_after_body /listing/bot.html;
    }

    location ~ /\. {
        deny all;
    }
}

