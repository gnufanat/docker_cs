server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Разрешаем листинг директорий
    add_before_body /listing/top.html;
	add_after_body /listing/bot.html;
    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    # Запретить отображение скрытых файлов
    location ~ /\. {
        deny all;
    }
}

