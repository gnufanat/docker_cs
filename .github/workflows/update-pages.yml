name: Sync README to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - README.md

jobs:
  update-gh-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create or switch to gh-pages
        run: |
          if git rev-parse --verify gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

      - name: Copy README.md to index.md
        run: cp ../README.md index.md

      - name: Commit and push
        run: |
          git add index.md
          git commit -m "Update index.md from README.md" || echo "No changes"
          git push origin gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
